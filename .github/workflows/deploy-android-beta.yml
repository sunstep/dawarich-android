name: Build & Deploy Android (gms + foss) → Open Beta [beta]

on:
  push:
    branches: [ beta ]
    paths:
      - "pubspec.yaml"
      - "lib/**"
      - "android/**"
      - "tools/**"
      - ".github/workflows/**"
      - "pubspec-foss.yaml"
      - "pubspec-foss.lock"
      - "pubspec-gms.yaml"
      - "pubspec-gms.lock"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Single source of truth for the build number ──
  # Runs first. All downstream jobs consume its outputs so both parallel
  # builds always use exactly the same version string.
  # Add [skip deploy] to a merge commit message to land changes on the branch
  # without triggering a Play upload. Unlike [skip ci], this does NOT suppress
  # tag-triggered workflows, so release-on-tag.yml still fires on v* tags.
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    outputs:
      app_version: ${{ steps.gen.outputs.app_version }}
      build_number: ${{ steps.gen.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate build number
        id: gen
        shell: bash
        run: |
          set -euo pipefail
          VLINE=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          APP_VERSION="${VLINE%%+*}"
          # YYMMDDCCC: 9-digit BCD build number (2-minute granularity, 32-bit safe).
          _CCC=$(( ( $(date -u +%H) * 60 + $(date -u +%M) ) / 2 ))
          BUILD_NUMBER=$(printf '%s%03d' "$(date -u +%y%m%d)" "$_CCC")
          echo "app_version=$APP_VERSION"   >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Generated: ${APP_VERSION}+${BUILD_NUMBER}"

  # ── Bake build number into pubspec early (parallel to builds) ──
  # By starting this the moment generate finishes, pubspec in the repo is
  # updated well before the upload step runs — so a tag created at any point
  # after the upload will carry the correct versionCode for F-Droid.
  # continue-on-error so a PR/merge hiccup never cancels the builds.
  bake:
    needs: generate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Bake build number into pubspec via PR → beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BN="${{ needs.generate.outputs.build_number }}"
          BASE="beta"
          BRANCH="chore/build-number-${BN}"

          # Skip if pubspec on the base branch already has this build number
          if git show "origin/${BASE}:pubspec.yaml" 2>/dev/null | grep -q "^version:.*+${BN}$"; then
            echo "Build number ${BN} already baked into ${BASE}, skipping."
            exit 0
          fi

          for f in pubspec.yaml pubspec-foss.yaml pubspec-gms.yaml; do
            [ -f "$f" ] && sed -i "s/^\(version: [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)+[0-9]*/\1+${BN}/" "$f"
          done

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pubspec.yaml pubspec-foss.yaml pubspec-gms.yaml
          git commit -m "chore: bake build number ${BN} [skip ci]"
          git push --force origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$BASE" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            PR_NUMBER="$EXISTING_PR"
            echo "Using existing PR #${PR_NUMBER}"
          else
            PR_URL=$(gh pr create \
              --base "$BASE" \
              --head "$BRANCH" \
              --title "chore: bake build number ${BN} [skip ci]" \
              --body "Auto-generated by deploy workflow. Bakes build number \`${BN}\` into pubspec so the next release tag uses the correct versionCode for F-Droid." \
              --label "automated")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #${PR_NUMBER}"
          fi

          if ! gh pr merge "$PR_NUMBER" --auto --squash --delete-branch 2>/dev/null; then
            echo "Auto-merge not available, merging immediately."
            gh pr merge "$PR_NUMBER" --squash --delete-branch
          fi

  # ── GMS build ──
  build-gms:
    needs: generate
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Flutter (from .flutter-version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3

      - name: Write android/local.properties
        shell: bash
        run: |
          set -e
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          FLUTTER_SDK="${FLUTTER_HOME:-$(dirname "$(dirname "$(readlink -f "$(which flutter)")")")}"
          {
            echo "sdk.dir=${SDK_DIR}"
            echo "flutter.sdk=${FLUTTER_SDK}"
          } > android/local.properties

      # Cache NDK and CMake so Gradle never needs to download them mid-build.
      - name: Cache NDK 27 and CMake 3.22
        uses: actions/cache@v4
        id: cache-ndk-cmake
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
          key: android-ndk-27.0.12077973-cmake-3.22.1-v1

      - name: Install NDK and CMake (if not cached)
        if: steps.cache-ndk-cmake.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          "${SDK_DIR}/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Pin NDK version in gradle.properties
        shell: bash
        run: |
          set -euo pipefail
          NDK_VERSION="27.0.12077973"
          GP=android/gradle.properties
          touch "${GP}"
          if grep -q '^android\.ndkVersion=' "${GP}"; then
            sed -i "s/^android\.ndkVersion=.*/android.ndkVersion=${NDK_VERSION}/" "${GP}"
          else
            printf '\nandroid.ndkVersion=%s\n' "${NDK_VERSION}" >> "${GP}"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure Gradle performance flags
        run: |
          sed -i '/^org\.gradle\.configuration-cache/d' android/gradle.properties || true
          cat >> android/gradle.properties <<'EOF'
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.daemon=true
          org.gradle.configuration-cache=false
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/dawarich-upload.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../dawarich-upload.jks
          EOF

      - name: Build GMS AAB (release)
        run: |
          flutter build appbundle --release --flavor gms \
            --build-name=${{ needs.generate.outputs.app_version }} \
            --build-number=${{ needs.generate.outputs.build_number }}

      - name: Upload GMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: gms-aab
          path: build/app/outputs/bundle/gmsRelease/*.aab
          retention-days: 30

  # ── FOSS build (parallel to GMS) ──
  build-foss:
    needs: generate
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Flutter (from .flutter-version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3

      - name: Write android/local.properties
        shell: bash
        run: |
          set -e
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          FLUTTER_SDK="${FLUTTER_HOME:-$(dirname "$(dirname "$(readlink -f "$(which flutter)")")")}"
          {
            echo "sdk.dir=${SDK_DIR}"
            echo "flutter.sdk=${FLUTTER_SDK}"
          } > android/local.properties

      # Cache NDK and CMake so Gradle never needs to download them mid-build.
      - name: Cache NDK 27 and CMake 3.22
        uses: actions/cache@v4
        id: cache-ndk-cmake
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
          key: android-ndk-27.0.12077973-cmake-3.22.1-v1

      - name: Install NDK and CMake (if not cached)
        if: steps.cache-ndk-cmake.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          "${SDK_DIR}/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Pin NDK version in gradle.properties
        shell: bash
        run: |
          set -euo pipefail
          NDK_VERSION="27.0.12077973"
          GP=android/gradle.properties
          touch "${GP}"
          if grep -q '^android\.ndkVersion=' "${GP}"; then
            sed -i "s/^android\.ndkVersion=.*/android.ndkVersion=${NDK_VERSION}/" "${GP}"
          else
            printf '\nandroid.ndkVersion=%s\n' "${NDK_VERSION}" >> "${GP}"
          fi

      - name: Switch pubspec to FOSS
        shell: bash
        run: |
          set -euo pipefail
          cp pubspec-foss.yaml pubspec.yaml
          cp pubspec-foss.lock pubspec.lock

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure Gradle performance flags
        run: |
          sed -i '/^org\.gradle\.configuration-cache/d' android/gradle.properties || true
          cat >> android/gradle.properties <<'EOF'
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.daemon=true
          org.gradle.configuration-cache=false
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: FOSS proprietary dependency check
        shell: bash
        run: |
          chmod +x tools/check_proprietary_deps.sh
          tools/check_proprietary_deps.sh fossReleaseRuntimeClasspath

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/dawarich-upload.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../dawarich-upload.jks
          EOF

      # Cronet HTTP depends on GMS to provide a native adapter. cronetHttpNoPlay is a flag that embeds a prebuilt cronet
      # for non GMS builds/MicroG variants in order to make them work even without Google Services.
      - name: Build FOSS APK (release)
        run: |
          flutter build apk --release --flavor foss \
            --build-name=${{ needs.generate.outputs.app_version }} \
            --build-number=${{ needs.generate.outputs.build_number }} \
            --dart-define=cronetHttpNoPlay=true \
            --dart-define=geolocatorNoPlay=true

      - name: Upload FOSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: foss-apk
          path: build/app/outputs/flutter-apk/app-foss-release.apk
          retention-days: 30

  upload-beta:
    needs: [generate, build-gms, build-foss]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GMS artifact
        uses: actions/download-artifact@v4
        with:
          name: gms-aab
          path: dist

      - name: Ensure whatsnew directory exists
        run: mkdir -p distribution/whatsnew

      - name: Upload to Play open beta (GMS)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PACKAGE_NAME_GMS }}
          releaseName: ${{ needs.generate.outputs.app_version }}+${{ needs.generate.outputs.build_number }}
          releaseFiles: dist/*.aab
          whatsNewDirectory: distribution/whatsnew
          track: beta
          status: completed

