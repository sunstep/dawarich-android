name: GitHub Release (gms + foss)

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "21"

    steps:

      - name: Resolve ref (tag)
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve release metadata
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          TAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Flutter (from .flutter-version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write android/local.properties
        shell: bash
        run: |
          set -e
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          FLUTTER_SDK="${FLUTTER_HOME:-$(dirname "$(dirname "$(readlink -f "$(which flutter)")")")}"
          {
            echo "sdk.dir=${SDK_DIR}"
            echo "flutter.sdk=${FLUTTER_SDK}"
          } > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # --- Signing (needed for release APK/AAB)
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/dawarich-upload.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../dawarich-upload.jks
          EOF

      - name: Read pubspec version (from default pubspec.yaml)
        id: ver
        shell: bash
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          # Strip 'v' prefix and any prerelease suffix for the build name
          SEMVER="${TAG#v}"
          # For the clean build name, strip prerelease (e.g. 0.19.0-beta.1 → 0.19.0)
          APP_VERSION="${SEMVER%%-*}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "app_version=$APP_VERSION"   >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "full_version=$SEMVER"       >> "$GITHUB_OUTPUT"

      # -------------------- GMS build (default pubspec.yaml) --------------------
      - name: Pub get (GMS)
        run: flutter pub get

      - name: Run build_runner (GMS)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (GMS)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --release --flavor gms \
            --build-name=${{ steps.ver.outputs.app_version }} \
            --build-number=${{ steps.ver.outputs.build_number }}

      # -------------------- Switch to FOSS pubspec --------------------
      - name: Switch pubspec to FOSS
        shell: bash
        run: |
          set -euo pipefail
          cp pubspec-foss.yaml pubspec.yaml
          cp pubspec-foss.lock pubspec.lock

      - name: Pub get (FOSS)
        run: flutter pub get

      - name: Run build_runner (FOSS)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: FOSS proprietary dependency check
        shell: bash
        run: |
          chmod +x tools/check_proprietary_deps.sh
          tools/check_proprietary_deps.sh fossReleaseRuntimeClasspath

      - name: Build APK (FOSS)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --release --flavor foss \
            --build-name=${{ steps.ver.outputs.app_version }} \
            --build-number=${{ steps.ver.outputs.build_number }}

      # -------------------- F-Droid changelog --------------------
      - name: Generate F-Droid changelog
        shell: bash
        run: |
          set -euo pipefail
          BUILD_NUMBER="${{ steps.ver.outputs.build_number }}"
          CHANGELOG_DIR="fastlane/metadata/android/en-US/changelogs"
          WHATSNEW="distribution/whatsnew/whatsnew-en-US"
          mkdir -p "$CHANGELOG_DIR"
          if [ -f "$WHATSNEW" ]; then
            cp "$WHATSNEW" "$CHANGELOG_DIR/${BUILD_NUMBER}.txt"
          else
            echo "See https://github.com/sunstep/dawarich-android/releases/tag/${{ steps.rel.outputs.tag }}" \
              > "$CHANGELOG_DIR/${BUILD_NUMBER}.txt"
          fi

      - name: Push F-Droid changelog via PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="${{ steps.ver.outputs.build_number }}"
          TAG="${{ steps.rel.outputs.tag }}"
          CHANGELOG="fastlane/metadata/android/en-US/changelogs/${BUILD_NUMBER}.txt"
          BRANCH="chore/fdroid-changelog-${BUILD_NUMBER}"

          # Skip if the file already exists on main
          git fetch origin main
          if git show "origin/main:${CHANGELOG}" &>/dev/null; then
            echo "Changelog ${BUILD_NUMBER}.txt already exists on main, skipping."
            exit 0
          fi

          # Save to temp before switching branches
          cp "$CHANGELOG" /tmp/changelog.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a new branch from main, add the file, force-push, open PR
          # Force-push handles retries where the branch already exists from a previous failed run
          git checkout -b "$BRANCH" origin/main
          mkdir -p "$(dirname "$CHANGELOG")"
          cp /tmp/changelog.txt "$CHANGELOG"
          git add "$CHANGELOG"
          git commit -m "chore: add F-Droid changelog for build ${BUILD_NUMBER} [skip ci]"
          git push --force origin "$BRANCH"

          # Only create a PR if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH}, skipping creation."
            PR_NUMBER="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: F-Droid changelog for ${TAG}" \
              --body "Auto-generated F-Droid changelog for build ${BUILD_NUMBER} (${TAG}).")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #${PR_NUMBER}"
          fi

          # Enable auto-merge (squash) so the changelog lands on main without manual intervention
          gh pr merge "$PR_NUMBER" --auto --squash

      # -------------------- Collect artifacts --------------------
      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          cp build/app/outputs/flutter-apk/app-gms-release.apk \
            dist/dawarich-${{ steps.ver.outputs.app_version }}+${{ steps.ver.outputs.build_number }}-gms.apk

          cp build/app/outputs/flutter-apk/app-foss-release.apk \
            dist/dawarich-${{ steps.ver.outputs.app_version }}+${{ steps.ver.outputs.build_number }}-foss.apk

          ls -la dist

      - name: Determine prerelease flag
        id: pre
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.rel.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          target_commitish: ${{ steps.rel.outputs.sha }}
          files: dist/*
          generate_release_notes: false
          fail_on_unmatched_files: true
          prerelease: ${{ steps.pre.outputs.prerelease }}