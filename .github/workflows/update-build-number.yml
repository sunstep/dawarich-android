name: Update Build Number

# Runs after every push to dev, appending a fresh YYMMDDCCC build number to
# all pubspec version strings. The number travels with the code when dev is
# merged into beta or main, so deploy and release workflows can simply read
# from pubspec — no generation or baking needed there.
#
# GITHUB_TOKEN-initiated pushes do not re-trigger workflows, so there is no
# loop risk and no need for branch-protection bypasses or PRs.

on:
  push:
    branches: [ dev ]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Generate and commit build number
        shell: bash
        run: |
          set -euo pipefail

          # YYMMDDCCC: 9-digit build number, 2-minute granularity, always increasing.
          _CCC=$(( ( $(date -u +%H) * 60 + $(date -u +%M) ) / 2 ))
          BUILD_NUMBER=$(printf '%s%03d' "$(date -u +%y%m%d)" "$_CCC")

          for f in pubspec.yaml pubspec-foss.yaml pubspec-gms.yaml; do
            [ -f "$f" ] && sed -i \
              "s/^\(version: [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)+[0-9]*/\1+${BUILD_NUMBER}/" \
              "$f"
          done

          # Nothing to commit if pubspec already had this exact number.
          if git diff --quiet pubspec.yaml pubspec-foss.yaml pubspec-gms.yaml 2>/dev/null; then
            echo "Build number already ${BUILD_NUMBER}, nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml pubspec-foss.yaml pubspec-gms.yaml
          git commit -m "chore: update build number to ${BUILD_NUMBER} [skip ci]"
          git push origin dev
          echo "Build number updated to ${BUILD_NUMBER}"

